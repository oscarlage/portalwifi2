<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conectado! — Sítio Coisa Nossa</title>
  <meta name="description" content="Você está conectado ao Wi‑Fi do Sítio Coisa Nossa." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="bg-noise" aria-hidden="true"></div>

  <main class="wrap">
    <header class="brand">
      <div class="logo" aria-hidden="true">
        <span class="logo-wifi">⌁</span>
      </div>
      <div class="brand-text">
        <div class="brand-title">Sítio Coisa Nossa</div>
        <div class="brand-sub">Wi‑Fi do Restaurante</div>
      </div>
    </header>

    <section class="card success">
      <div class="success-badge" aria-hidden="true">✓</div>
      <h1>Conectado ao Wi‑Fi!</h1>
      <p class="lead">
        Obrigado! Aproveite sua experiência no <strong>Sítio Coisa Nossa</strong>.
      </p>

      <div class="cta-row">
        <a class="btn outline" href="/" rel="nofollow">Voltar</a>
        <a class="btn" href="https://instagram.com/" target="_blank" rel="noopener">Seguir no Instagram</a>
      </div>

      <div class="promo">
        <h2>Promoções & novidades</h2>
        <p id="promoMsg">Fique de olho: toda semana tem novidades por aqui 😉</p>
      </div>

      <div class="tiny muted" id="debugLine"></div>
    </section>

    <footer class="foot">
      <div>© <span id="year"></span> Sítio Coisa Nossa</div>
      <div class="sep">•</div>
      <a class="muted" href="/termos.html">LGPD</a>
    </footer>
  </main>

  <script src="/assets/js/settings.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const params = new URLSearchParams(location.search);
    const leadId = params.get('lead_id');
    const deduped = params.get('deduped');
    const inserted = params.get('inserted');
    const phone = params.get('phone');
    const dbg = [];
    if (leadId) dbg.push("lead_id=" + leadId);
    if (typeof inserted === "string") dbg.push("inserted=" + inserted);
    if (typeof deduped === "string") dbg.push("deduped=" + deduped);
    if (phone) dbg.push("phone=" + phone);
    if (dbg.length) document.getElementById('debugLine').textContent = "debug: " + dbg.join(" • ");
  </script>
</body>
</html>
