<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Relatórios</title>
<link rel="stylesheet" href="/assets/css/estabelecimento.css">
</head>

<body class="frame-page">
  <div class="page-content">

    <section class="panel-card">
      <header class="section-header">
        <h1>Relatórios</h1>
        <p>Análise de acessos e comportamento dos clientes conectados ao Wi-Fi.</p>
      </header>

      <div class="filters-grid">
        <label>
          <span>Período</span>
          <select id="reportPeriod">
            <option value="today">Hoje</option>
            <option value="7d">Últimos 7 dias</option>
            <option value="30d">Últimos 30 dias</option>
            <option value="custom">Personalizado</option>
          </select>
        </label>

        <label>
          <span>Data inicial</span>
          <input type="date" id="reportDateFrom">
        </label>

        <label>
          <span>Data final</span>
          <input type="date" id="reportDateTo">
        </label>

        <label>
          <span>Hora inicial</span>
          <select id="reportHourFrom"></select>
        </label>

        <label>
          <span>Hora final</span>
          <select id="reportHourTo"></select>
        </label>

        <div class="filter-actions">
          <button type="button" class="btn-secondary" id="applyReportFilters">Aplicar filtros</button>
        </div>
      </div>
    </section>

    <section class="dashboard-grid">
      <div class="metric-card">
        <div class="metric-label">Conexões no período</div>
        <div class="metric-value" id="reportConnectionsToday">0</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Novos clientes</div>
        <div class="metric-value" id="reportNewCustomers">0</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Clientes recorrentes</div>
        <div class="metric-value" id="reportReturningCustomers">0</div>
      </div>
    </section>

    <section class="panel-card">
      <h2>Horários de pico</h2>
      <p class="muted">O gráfico é atualizado conforme período, datas e faixa horária.</p>

      <div class="chart-box">
        <canvas id="peakHoursCanvas"></canvas>
      </div>
    </section>

    <section class="panel-card" style="margin-top:20px;">
      <h2>Resumo de comportamento</h2>
      <div id="reportInsights">
        <ul class="bullets">
          <li>Aguardando dados para gerar análises.</li>
        </ul>
      </div>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/assets/js/relatorios.js"></script>
</body>
</html>
