<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Campanhas</title>
  <link rel="stylesheet" href="/assets/css/estabelecimento.css">

  <style>
    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-card {
      width: 100%;
      max-width: 860px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
      overflow: hidden;
    }

    .modal-header,
    .modal-footer {
      padding: 18px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .modal-footer {
      border-top: 1px solid #e5e7eb;
      border-bottom: 0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 20px;
    }

    .modal-close {
      border: 0;
      background: transparent;
      font-size: 24px;
      cursor: pointer;
    }

    .modal-body {
      padding: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
    }

    .form-group textarea {
      min-height: 110px;
      resize: vertical;
    }

    .btn-primary,
    .btn-secondary {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: #0f766e;
      color: #fff;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .status-active {
      background: #dcfce7;
      color: #166534;
    }

    .status-inactive {
      background: #fee2e2;
      color: #991b1b;
    }

    .table-action {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #0f172a;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
      margin-right: 6px;
    }

    .muted {
      color: #64748b;
      text-align: center;
    }

    @media (max-width: 720px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="frame-page">
  <div class="page-content">
    <section class="panel-card">
      <header class="section-header">
        <h1>Campanhas</h1>
        <p>Crie e gerencie campanhas promocionais do portal Wi-Fi.</p>
      </header>

      <div class="toolbar">
        <button class="btn-primary" id="openCampaignModal">Nova campanha</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Tipo</th>
              <th>Público</th>
              <th>Status</th>
              <th>Período</th>
              <th>Prioridade</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="campaignTable">
            <tr>
              <td colspan="7" class="muted">Carregando campanhas...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="campaignModal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="campaignModalTitle">Nova campanha</h2>
        <button class="modal-close" id="closeCampaignModal">&times;</button>
      </div>

      <form id="campaignForm">
        <div class="modal-body">
          <input type="hidden" id="campaignId">

          <div class="form-grid">
            <div class="form-group full">
              <label for="campaignTitle">Título</label>
              <input type="text" id="campaignTitle" required>
            </div>

            <div class="form-group full">
              <label for="campaignMessage">Mensagem</label>
              <textarea id="campaignMessage" required></textarea>
            </div>

            <div class="form-group">
              <label for="campaignType">Tipo de campanha</label>
              <select id="campaignType" required>
                <option value="portal">Portal</option>
                <option value="post_login">Pós-login</option>
                <option value="coupon">Cupom</option>
                <option value="birthday">Aniversário</option>
                <option value="returning_customer">Cliente recorrente</option>
                <option value="inactive_customer">Cliente inativo</option>
              </select>
            </div>

            <div class="form-group">
              <label for="audienceType">Público</label>
              <select id="audienceType" required>
                <option value="all">Todos</option>
                <option value="new_customers">Novos clientes</option>
                <option value="returning_customers">Clientes recorrentes</option>
                <option value="inactive_30d">Inativos há 30 dias</option>
                <option value="inactive_60d">Inativos há 60 dias</option>
                <option value="birthday_month">Aniversariantes do mês</option>
                <option value="consent_marketing">Com consentimento de marketing</option>
              </select>
            </div>

            <div class="form-group">
              <label for="campaignStartsAt">Início</label>
              <input type="datetime-local" id="campaignStartsAt">
            </div>

            <div class="form-group">
              <label for="campaignEndsAt">Fim</label>
              <input type="datetime-local" id="campaignEndsAt">
            </div>

            <div class="form-group">
              <label for="campaignCouponCode">Cupom</label>
              <input type="text" id="campaignCouponCode" placeholder="Ex.: SITIO10">
            </div>

            <div class="form-group">
              <label for="campaignPriority">Prioridade</label>
              <input type="number" id="campaignPriority" min="0" value="0">
            </div>

            <div class="form-group">
              <label for="campaignCtaLabel">Texto do botão</label>
              <input type="text" id="campaignCtaLabel" placeholder="Ex.: Resgatar oferta">
            </div>

            <div class="form-group">
              <label for="campaignCtaUrl">URL do botão</label>
              <input type="url" id="campaignCtaUrl" placeholder="https://...">
            </div>

            <div class="form-group full">
              <label for="campaignImageUrl">Imagem/Banner URL</label>
              <input type="url" id="campaignImageUrl" placeholder="https://...">
            </div>

            <div class="form-group">
              <label for="campaignActive">Status</label>
              <select id="campaignActive">
                <option value="true">Ativa</option>
                <option value="false">Inativa</option>
              </select>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="cancelCampaignModal">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar campanha</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/js/campanhas.js"></script>
</body>
</html>
