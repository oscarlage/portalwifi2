<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal WiFi</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
    <h1>Portal WiFi</h1>
    <p>Verificando acesso...</p>
  </div>

  <script>
    window.PORTAL_SUPABASE_URL = "https://SEU-PROJETO.supabase.co";
    window.PORTAL_SUPABASE_ANON_KEY = "SUA_ANON_KEY";
  </script>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      window.PORTAL_SUPABASE_URL,
      window.PORTAL_SUPABASE_ANON_KEY
    );

    async function redirectByProfile() {
      try {
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (sessionError || !session || !session.user) {
          window.location.replace("/login.html");
          return;
        }

        const userId = session.user.id;

        const { data: profile, error: profileError } = await supabase
          .from("profiles")
          .select("user_id, status, is_platform_user")
          .eq("user_id", userId)
          .single();

        if (profileError || !profile) {
          await supabase.auth.signOut();
          window.location.replace("/login.html?erro=perfil_nao_encontrado");
          return;
        }

        if (profile.status !== "active") {
          await supabase.auth.signOut();
          window.location.replace("/login.html?erro=usuario_inativo");
          return;
        }

        if (profile.is_platform_user === true) {
          sessionStorage.removeItem("tenant_id");
          sessionStorage.removeItem("tenant_role");
          window.location.replace("/platform.html");
          return;
        }

        const { data: memberships, error: membershipError } = await supabase
          .from("tenant_members")
          .select("tenant_id, role, is_active")
          .eq("user_id", userId)
          .eq("is_active", true)
          .limit(1);

        if (membershipError || !memberships || memberships.length === 0) {
          await supabase.auth.signOut();
          window.location.replace("/login.html?erro=sem_vinculo");
          return;
        }

        const membership = memberships[0];

        sessionStorage.setItem("tenant_id", membership.tenant_id);
        sessionStorage.setItem("tenant_role", membership.role);

        window.location.replace("/estabelecimento/index.html");
      } catch (err) {
        console.error("Erro ao verificar acesso:", err);
        window.location.replace("/login.html?erro=falha_autenticacao");
      }
    }

    redirectByProfile();
  </script>
</body>
</html>
