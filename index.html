<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portal WiFi</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
      background:#f6f7fb;
      color:#0f172a;
    }
    .box{
      width:min(92vw,620px);
      background:#fff;
      border:1px solid rgba(15,23,42,.12);
      border-radius:16px;
      padding:24px;
      box-shadow:0 10px 24px rgba(15,23,42,.06);
    }
    h2{margin:0 0 8px}
    p{margin:0;color:#475569}
    pre{
      white-space:pre-wrap;
      word-break:break-word;
      background:#0b1020;
      color:#e5e7eb;
      border-radius:12px;
      padding:12px;
      font-size:12px;
      max-height:320px;
      overflow:auto;
      margin-top:16px;
    }
    .ok{color:#16a34a;font-weight:700}
    .err{color:#dc2626;font-weight:700}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="box">
    <h2>Portal WiFi</h2>
    <p id="status">Verificando autenticação...</p>
    <pre id="log"></pre>
  </div>

  <script>
    if (window.__PORTALWIFI_ROOT_INIT__) {
      console.warn("Root router já inicializado.");
    } else {
      window.__PORTALWIFI_ROOT_INIT__ = true;

      const SUPABASE_URL = "https://kedmyfxtxcfnyftkasfg.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_MrWt1zkvKjRgy0xWnEcVpA_SBJ7PSFO";
      
      const logBox = document.getElementById("log");
      const statusBox = document.getElementById("status");

      function setStatus(text, cls = "") {
        statusBox.textContent = text;
        statusBox.className = cls;
      }

      function addLog(obj) {
        const txt = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
        logBox.textContent += (logBox.textContent ? "\n" : "") + txt;
        console.log(obj);
      }

      function clearTenantSession() {
        try {
          sessionStorage.removeItem("tenant_id");
          sessionStorage.removeItem("tenant_role");
        } catch (e) {
          console.warn("Falha ao limpar sessionStorage:", e);
        }
      }

      async function signOutAndRedirect(reason = "") {
        try {
          clearTenantSession();
          await sb.auth.signOut();
        } catch (e) {
          console.error("Erro ao encerrar sessão:", e);
        }

        const target = reason
          ? `/login.html?error=${encodeURIComponent(reason)}`
          : "/login.html";

        window.location.replace(target);
      }

      if (!window.__PORTAL_SUPABASE_CLIENT__) {
        window.__PORTAL_SUPABASE_CLIENT__ = window.supabase.createClient(
          SUPABASE_URL,
          SUPABASE_ANON_KEY
        );
      }

      const sb = window.__PORTAL_SUPABASE_CLIENT__;

      async function init() {
        try {
          setStatus("Verificando sessão...");

          const { data: sessionData, error: sessionError } = await sb.auth.getSession();
          addLog({
            step: "session",
            hasSession: !!sessionData?.session,
            sessionError: sessionError ? sessionError.message : null
          });

          if (sessionError) {
            setStatus("Falha ao ler sessão. Redirecionando para login...", "err");
            setTimeout(() => {
              signOutAndRedirect("session_error");
            }, 500);
            return;
          }

          const session = sessionData.session;

          if (!session || !session.user) {
            setStatus("Sem sessão. Redirecionando para login...");
            setTimeout(() => {
              window.location.replace("/login.html");
            }, 500);
            return;
          }

          const userId = session.user.id;

          setStatus("Consultando perfil...");

          const { data: profile, error: profileError } = await sb
            .from("profiles")
            .select("user_id,email,full_name,status,is_platform_user,platform_role")
            .eq("user_id", userId)
            .single();

          addLog({
            step: "profile",
            profile,
            profileError: profileError ? profileError.message : null
          });

          if (profileError || !profile) {
            setStatus("Falha: perfil não encontrado. Redirecionando...", "err");
            setTimeout(() => {
              signOutAndRedirect("profile_not_found");
            }, 700);
            return;
          }

          if (profile.status !== "active") {
            setStatus("Falha: usuário inativo, status = " + profile.status + ". Redirecionando...", "err");
            setTimeout(() => {
              signOutAndRedirect("user_inactive");
            }, 900);
            return;
          }

          if (profile.is_platform_user === true) {
            clearTenantSession();
            setStatus("Usuário global detectado. Redirecionando para platform.html...", "ok");
            setTimeout(() => {
              window.location.replace("/platform.html");
            }, 800);
            return;
          }

          setStatus("Consultando vínculo do tenant...");

          const { data: memberships, error: membershipError } = await sb
            .from("tenant_members")
            .select("tenant_id,role,is_active")
            .eq("user_id", userId)
            .eq("is_active", true)
            .limit(1);

          addLog({
            step: "membership",
            memberships,
            membershipError: membershipError ? membershipError.message : null
          });

          if (membershipError || !memberships || memberships.length === 0) {
            setStatus("Falha: sem vínculo ativo de tenant. Redirecionando...", "err");
            setTimeout(() => {
              signOutAndRedirect("no_active_membership");
            }, 900);
            return;
          }

          const membership = memberships[0];
          sessionStorage.setItem("tenant_id", membership.tenant_id);
          sessionStorage.setItem("tenant_role", membership.role);

          setStatus("Usuário tenant detectado. Redirecionando para estabelecimento...", "ok");
          setTimeout(() => {
            window.location.replace("/estabelecimento/index.html");
          }, 800);

        } catch (err) {
          addLog({
            step: "fatal_error",
            message: err.message,
            stack: err.stack
          });
          setStatus("Erro fatal. Redirecionando para login...", "err");
          setTimeout(() => {
            signOutAndRedirect("unexpected_error");
          }, 1000);
        }
      }

      init();
    }
  </script>
</body>
</html>
